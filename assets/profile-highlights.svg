<svg width="1000" height="500" viewBox="0 0 1000 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Teja MVS Profile Highlights</title>
  <desc id="desc">Professional profile highlights covering technical leadership, mentoring, system design, and automation mindset.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="line" x1="66" y1="86" x2="934" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="shadow" x="18" y="24" width="964" height="450" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1000" height="500" rx="28" fill="url(#bg)"/>
  <circle cx="910" cy="66" r="130" fill="#2563EB" opacity="0.11"/>
  <circle cx="86" cy="430" r="180" fill="#22C55E" opacity="0.08"/>

  <text x="66" y="58" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Profile Highlights</text>
  <text x="66" y="88" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Technical leadership for DevOps, cloud platforms, architecture, automation, and practical engineering mentorship.</text>
  <rect x="66" y="112" width="868" height="4" rx="2" fill="url(#line)"/>

  <g filter="url(#shadow)">
    <rect x="66" y="148" width="414" height="132" rx="22" fill="#0F172A"/>
    <rect x="66.5" y="148.5" width="413" height="131" rx="21.5" stroke="#38BDF8" stroke-opacity="0.22"/>
    <rect x="94" y="176" width="48" height="48" rx="16" fill="#0EA5E9" fill-opacity="0.18"/>
    <path d="M108 211h20v-22h-20v22Zm25 0h4v-34h-4v34Z" fill="#38BDF8"/>
    <text x="162" y="188" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Technical Leadership</text>
    <text x="162" y="220" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Leading DevOps, CI/CD, cloud, platform</text>
    <text x="162" y="244" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">engineering, and production reliability teams.</text>

    <rect x="520" y="148" width="414" height="132" rx="22" fill="#0F172A"/>
    <rect x="520.5" y="148.5" width="413" height="131" rx="21.5" stroke="#22C55E" stroke-opacity="0.22"/>
    <rect x="548" y="176" width="48" height="48" rx="16" fill="#22C55E" fill-opacity="0.18"/>
    <path d="M562 190h20a9 9 0 0 1 0 18h-20v-18Zm20 18 13 13" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
    <text x="616" y="188" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Mentor / Tutor</text>
    <text x="616" y="220" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Helping engineers learn through hands-on</text>
    <text x="616" y="244" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">DevOps workflows and real project guidance.</text>

    <rect x="66" y="312" width="414" height="132" rx="22" fill="#0F172A"/>
    <rect x="66.5" y="312.5" width="413" height="131" rx="21.5" stroke="#FACC15" stroke-opacity="0.22"/>
    <rect x="94" y="340" width="48" height="48" rx="16" fill="#FACC15" fill-opacity="0.16"/>
    <path d="M118 352 99 379h38l-19-27Z" stroke="#FACC15" stroke-width="5" stroke-linejoin="round"/>
    <text x="162" y="352" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">System Design</text>
    <text x="162" y="384" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Designing scalable, secure, reliable, and</text>
    <text x="162" y="408" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">maintainable engineering platforms.</text>

    <rect x="520" y="312" width="414" height="132" rx="22" fill="#0F172A"/>
    <rect x="520.5" y="312.5" width="413" height="131" rx="21.5" stroke="#F97316" stroke-opacity="0.22"/>
    <rect x="548" y="340" width="48" height="48" rx="16" fill="#F97316" fill-opacity="0.17"/>
    <path d="M559 366h27M572 352v28M586 352l8 8-8 8" stroke="#F97316" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="616" y="352" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Automation Mindset</text>
    <text x="616" y="384" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Turning manual operations into repeatable,</text>
    <text x="616" y="408" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">governed, reliable automated workflows.</text>
  </g>
</svg>
