<svg width="1000" height="560" viewBox="0 0 1000 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">What Teja MVS Designs And Builds</title>
  <desc id="desc">Graphical summary of system architecture, cloud infrastructure, CI/CD automation, containers, infrastructure as code, monitoring, and team enablement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#123B4D"/>
    </linearGradient>
    <linearGradient id="accent" x1="70" y1="64" x2="930" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.45" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="shadow" x="24" y="30" width="952" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 32px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .heading { font: 800 17px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
    </style>
  </defs>

  <rect width="1000" height="560" rx="28" fill="url(#bg)"/>
  <circle cx="904" cy="78" r="140" fill="#2563EB" opacity="0.09"/>
  <circle cx="92" cy="512" r="170" fill="#22C55E" opacity="0.07"/>

  <text x="70" y="64" class="title">What I Design And Build</text>
  <text x="70" y="94" class="subtitle">Production-ready platforms, delivery systems, automation workflows, and team enablement.</text>
  <rect x="70" y="120" width="860" height="4" rx="2" fill="url(#accent)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="154" width="268" height="132" rx="20" fill="#0F172A"/>
    <rect x="70.5" y="154.5" width="267" height="131" rx="19.5" stroke="#38BDF8" stroke-opacity="0.22"/>
    <rect x="94" y="180" width="44" height="44" rx="14" fill="#38BDF8" fill-opacity="0.15"/>
    <path d="M105 213h22l-11-22-11 22Z" stroke="#38BDF8" stroke-width="4" stroke-linejoin="round"/>
    <text x="152" y="191" class="heading">System Architecture</text>
    <text x="152" y="219" class="body">Scalable, secure, reliable</text>
    <text x="152" y="241" class="body">application and platform designs.</text>

    <rect x="366" y="154" width="268" height="132" rx="20" fill="#0F172A"/>
    <rect x="366.5" y="154.5" width="267" height="131" rx="19.5" stroke="#22C55E" stroke-opacity="0.22"/>
    <rect x="390" y="180" width="44" height="44" rx="14" fill="#22C55E" fill-opacity="0.15"/>
    <path d="M400 211h30M405 201h20M412 190v31" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
    <text x="448" y="191" class="heading">Cloud Infrastructure</text>
    <text x="448" y="219" class="body">AWS, Azure, compute, networking,</text>
    <text x="448" y="241" class="body">access, and security foundations.</text>

    <rect x="662" y="154" width="268" height="132" rx="20" fill="#0F172A"/>
    <rect x="662.5" y="154.5" width="267" height="131" rx="19.5" stroke="#F97316" stroke-opacity="0.22"/>
    <rect x="686" y="180" width="44" height="44" rx="14" fill="#F97316" fill-opacity="0.15"/>
    <path d="M697 202h23M708 191v22M720 191l8 8-8 8" stroke="#F97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="744" y="191" class="heading">CI/CD Automation</text>
    <text x="744" y="219" class="body">Jenkins, GitLab CI, TeamCity,</text>
    <text x="744" y="241" class="body">release pipelines, and governance.</text>

    <rect x="70" y="316" width="268" height="132" rx="20" fill="#0F172A"/>
    <rect x="70.5" y="316.5" width="267" height="131" rx="19.5" stroke="#0EA5E9" stroke-opacity="0.22"/>
    <rect x="94" y="342" width="44" height="44" rx="14" fill="#0EA5E9" fill-opacity="0.15"/>
    <rect x="104" y="354" width="24" height="24" rx="5" stroke="#0EA5E9" stroke-width="4"/>
    <text x="152" y="353" class="heading">Containers</text>
    <text x="152" y="381" class="body">Docker, Kubernetes, and Helm</text>
    <text x="152" y="403" class="body">deployment/runtime patterns.</text>

    <rect x="366" y="316" width="268" height="132" rx="20" fill="#0F172A"/>
    <rect x="366.5" y="316.5" width="267" height="131" rx="19.5" stroke="#8B5CF6" stroke-opacity="0.22"/>
    <rect x="390" y="342" width="44" height="44" rx="14" fill="#8B5CF6" fill-opacity="0.15"/>
    <path d="M399 356h26M399 371h26M407 348v31" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
    <text x="448" y="353" class="heading">Infrastructure as Code</text>
    <text x="448" y="381" class="body">Terraform, Ansible, Packer,</text>
    <text x="448" y="403" class="body">provisioning, and configuration.</text>

    <rect x="662" y="316" width="268" height="132" rx="20" fill="#0F172A"/>
    <rect x="662.5" y="316.5" width="267" height="131" rx="19.5" stroke="#FACC15" stroke-opacity="0.22"/>
    <rect x="686" y="342" width="44" height="44" rx="14" fill="#FACC15" fill-opacity="0.15"/>
    <path d="M697 375h6v-17h-6v17Zm11 0h6v-27h-6v27Zm11 0h6v-13h-6v13Z" fill="#FACC15"/>
    <text x="744" y="353" class="heading">Monitoring</text>
    <text x="744" y="381" class="body">Prometheus, Grafana, Zabbix,</text>
    <text x="744" y="403" class="body">metrics, alerts, and dashboards.</text>

    <rect x="218" y="476" width="564" height="54" rx="18" fill="#0F172A"/>
    <rect x="218.5" y="476.5" width="563" height="53" rx="17.5" stroke="#22C55E" stroke-opacity="0.22"/>
    <text x="250" y="510" class="heading">Team Enablement</text>
    <text x="430" y="510" class="body">Mentoring, tutoring, documentation, training, and process maturity.</text>
  </g>
</svg>
