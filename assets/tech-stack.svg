<svg width="1000" height="760" viewBox="0 0 1000 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Teja MVS Tech Stack</title>
  <desc id="desc">Organized technology stack for cloud, DevOps, containers, infrastructure as code, source control, artifact management, monitoring, operating systems, and tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F3A4A"/>
    </linearGradient>
    <linearGradient id="banner" x1="58" y1="46" x2="942" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.48" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="960" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .subtitle { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #DFFDF6; }
      .card-title { font: 800 18px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #E5E7EB; }
    </style>
  </defs>

  <rect width="1000" height="760" rx="28" fill="url(#bg)"/>
  <circle cx="900" cy="88" r="150" fill="#38BDF8" opacity="0.08"/>
  <circle cx="104" cy="690" r="190" fill="#22C55E" opacity="0.07"/>

  <g filter="url(#shadow)">
