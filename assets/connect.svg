<svg width="1000" height="330" viewBox="0 0 1000 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Connect With Teja MVS</title>
  <desc id="desc">Contact links for email, LinkedIn, and YouTube with a closing statement about building better systems and engineering teams.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#123B4D"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="248" x2="1000" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="960" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 32px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .chip { font: 800 15px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .foot { font: 800 21px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1000" height="330" rx="28" fill="url(#bg)"/>
  <circle cx="890" cy="58" r="136" fill="#38BDF8" opacity="0.08"/>
  <path d="M0 270C146 220 260 318 406 264C554 210 674 300 826 244C910 214 960 224 1000 238V330H0V270Z" fill="url(#wave)" opacity="0.86"/>

  <g filter="url(#shadow)">
    <rect x="70" y="54" width="860" height="178" rx="26" fill="#0F172A" fill-opacity="0.9"/>
    <rect x="70.5" y="54.5" width="859" height="177" rx="25.5" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="108" y="102" class="title">Connect</text>
    <text x="108" y="136" class="body">I enjoy mentoring engineers, tutoring DevOps learners, and helping teams design better systems,</text>
    <text x="108" y="160" class="body">stronger platforms, and smoother delivery pipelines.</text>

    <rect x="108" y="186" width="258" height="38" rx="19" fill="#EA4335"/>
    <text x="132" y="211" class="chip">Email: venkatasuryamaddula@gmail.com</text>
    <rect x="382" y="186" width="176" height="38" rx="19" fill="#0A66C2"/>
    <text x="426" y="211" class="chip">LinkedIn: Teja MVS</text>
    <rect x="574" y="186" width="218" height="38" rx="19" fill="#FF0000"/>
    <text x="616" y="211" class="chip">YouTube: DevOps Learning</text>
  </g>

  <text x="238" y="294" class="foot">Building better systems, better platforms, and better engineering teams.</text>
</svg>
