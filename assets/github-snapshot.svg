<svg width="1000" height="620" viewBox="0 0 1000 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Teja MVS GitHub Engineering Snapshot</title>
  <desc id="desc">A professional GitHub profile snapshot for DevOps, cloud, platform engineering, system design, and mentoring.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1000" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#0B3B46"/>
    </linearGradient>
    <linearGradient id="hero" x1="62" y1="54" x2="938" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.45" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="cardA" x1="62" y1="234" x2="484" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#123B4D"/>
    </linearGradient>
    <linearGradient id="cardB" x1="516" y1="234" x2="938" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="cardC" x1="62" y1="448" x2="938" y2="568" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06212B"/>
      <stop offset="0.52" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="960" height="580" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1000" height="620" rx="28" fill="url(#page)"/>
  <rect width="1000" height="620" rx="28" fill="url(#grid)"/>
  <circle cx="890" cy="88" r="150" fill="#38BDF8" opacity="0.08"/>
  <circle cx="105" cy="542" r="178" fill="#22C55E" opacity="0.07"/>

  <g filter="url(#shadow)">
    <rect x="62" y="54" width="876" height="148" rx="24" fill="url(#hero)"/>
    <rect x="62.5" y="54.5" width="875" height="147" rx="23.5" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="96" y="112" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">GitHub Engineering Snapshot</text>
    <text x="96" y="150" fill="#DFFDF6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Teja MVS - DevOps Architecture | Cloud Platforms | System Design</text>
    <text x="96" y="176" fill="#BFEFE6" font-family="Segoe UI, Arial, sans-serif" font-size="14">Reliable platforms, clean automation, practical mentoring, and production-ready delivery systems.</text>
    <rect x="775" y="86" width="118" height="38" rx="19" fill="#020617" fill-opacity="0.28"/>
    <text x="804" y="111" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">PROFILE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="62" y="234" width="422" height="184" rx="22" fill="url(#cardA)"/>
    <rect x="62.5" y="234.5" width="421" height="183" rx="21.5" stroke="#38BDF8" stroke-opacity="0.22"/>
    <text x="92" y="282" fill="#67E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Engineering Focus</text>
    <text x="92" y="318" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Platform Engineering</text>
    <text x="92" y="348" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Reusable pipelines, self-service infrastructure,</text>
    <text x="92" y="372" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">automation-first delivery, and resilient operations.</text>
    <rect x="338" y="276" width="92" height="92" rx="24" fill="#22C55E" fill-opacity="0.13"/>
    <path d="M365 335h18v-50h-18v50Zm28 0h18v-34h-18v34Zm28 0h18v-66h-18v66Z" fill="#22C55E"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="516" y="234" width="422" height="184" rx="22" fill="url(#cardB)"/>
    <rect x="516.5" y="234.5" width="421" height="183" rx="21.5" stroke="#22C55E" stroke-opacity="0.22"/>
    <text x="546" y="282" fill="#A7F3D0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Profile Strengths</text>
    <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
      <rect x="546" y="306" width="158" height="34" rx="17" fill="#0EA5E9" fill-opacity="0.2"/>
      <text x="568" y="328" fill="#E0F2FE">System Design</text>
      <rect x="716" y="306" width="132" height="34" rx="17" fill="#22C55E" fill-opacity="0.18"/>
      <text x="738" y="328" fill="#DCFCE7">Mentoring</text>
      <rect x="546" y="354" width="174" height="34" rx="17" fill="#F97316" fill-opacity="0.18"/>
      <text x="568" y="376" fill="#FFEDD5">Cloud Delivery</text>
      <rect x="732" y="354" width="144" height="34" rx="17" fill="#8B5CF6" fill-opacity="0.2"/>
      <text x="754" y="376" fill="#EDE9FE">Automation</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="62" y="448" width="876" height="120" rx="22" fill="url(#cardC)"/>
    <rect x="62.5" y="448.5" width="875" height="119" rx="21.5" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="92" y="490" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Contribution Rhythm</text>
    <text x="92" y="522" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Consistent learning, repository improvements, DevOps examples, and architecture-focused knowledge sharing.</text>
    <g transform="translate(650 480)">
      <rect x="0" y="44" width="18" height="18" rx="5" fill="#14532D"/>
      <rect x="28" y="34" width="18" height="28" rx="5" fill="#166534"/>
      <rect x="56" y="22" width="18" height="40" rx="5" fill="#16A34A"/>
      <rect x="84" y="10" width="18" height="52" rx="5" fill="#22C55E"/>
      <rect x="112" y="28" width="18" height="34" rx="5" fill="#14B8A6"/>
      <rect x="140" y="16" width="18" height="46" rx="5" fill="#38BDF8"/>
      <rect x="168" y="0" width="18" height="62" rx="5" fill="#FACC15"/>
    </g>
  </g>
</svg>
