<svg width="1000" height="650" viewBox="0 0 1000 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">About Teja MVS And Leadership Focus</title>
  <desc id="desc">About me and leadership focus summary for DevOps, platform engineering, cloud infrastructure, observability, and training.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.54" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B3B46"/>
    </linearGradient>
    <linearGradient id="header" x1="58" y1="48" x2="942" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.45" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="960" height="610" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 30px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .sub { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #DFFDF6; }
      .h { font: 800 18px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .b { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .small { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #E5E7EB; }
    </style>
  </defs>

  <rect width="1000" height="650" rx="28" fill="url(#bg)"/>
  <circle cx="900" cy="86" r="150" fill="#38BDF8" opacity="0.08"/>
  <circle cx="100" cy="586" r="180" fill="#22C55E" opacity="0.07"/>

  <g filter="url(#shadow)">
    <rect x="58" y="48" width="884" height="92" rx="24" fill="url(#header)"/>
    <text x="88" y="90" class="title">About Me &amp; Leadership Focus</text>
    <text x="88" y="118" class="sub">10+ years across DevOps leadership, cloud platforms, CI/CD automation, and engineering enablement.</text>

    <rect x="58" y="174" width="884" height="168" rx="22" fill="#0F172A"/>
    <rect x="58.5" y="174.5" width="883" height="167" rx="21.5" stroke="#38BDF8" stroke-opacity="0.18"/>
    <text x="88" y="215" class="h">Professional Summary</text>
    <text x="88" y="248" class="b">DevOps and cloud professional from India with strong experience in technical leadership, platform</text>
    <text x="88" y="272" class="b">engineering, cloud infrastructure, CI/CD automation, architecture, and mentoring.</text>
    <rect x="88" y="300" width="168" height="30" rx="15" fill="#2563EB" fill-opacity="0.55"/><text x="110" y="320" class="small">Delivery Ownership</text>
    <rect x="266" y="300" width="160" height="30" rx="15" fill="#0F766E" fill-opacity="0.55"/><text x="288" y="320" class="small">DevOps Mentoring</text>
    <rect x="436" y="300" width="178" height="30" rx="15" fill="#7C3AED" fill-opacity="0.55"/><text x="458" y="320" class="small">Clean Architecture</text>
    <rect x="624" y="300" width="204" height="30" rx="15" fill="#F97316" fill-opacity="0.55"/><text x="646" y="320" class="small">Production Readiness</text>

    <rect x="58" y="376" width="276" height="104" rx="20" fill="#0F172A"/>
    <rect x="58.5" y="376.5" width="275" height="103" rx="19.5" stroke="#22C55E" stroke-opacity="0.2"/>
    <text x="82" y="414" class="h">Platform Engineering</text>
    <text x="82" y="444" class="b">Developer-friendly tooling, reusable</text>
    <text x="82" y="466" class="b">pipelines, and self-service infrastructure.</text>

    <rect x="362" y="376" width="276" height="104" rx="20" fill="#0F172A"/>
    <rect x="362.5" y="376.5" width="275" height="103" rx="19.5" stroke="#F97316" stroke-opacity="0.2"/>
    <text x="386" y="414" class="h">DevOps Transformation</text>
    <text x="386" y="444" class="b">Automation strategy, release governance,</text>
    <text x="386" y="466" class="b">process maturity, and team enablement.</text>

    <rect x="666" y="376" width="276" height="104" rx="20" fill="#0F172A"/>
    <rect x="666.5" y="376.5" width="275" height="103" rx="19.5" stroke="#38BDF8" stroke-opacity="0.2"/>
    <text x="690" y="414" class="h">System Architecture</text>
    <text x="690" y="444" class="b">Scalable designs, clean boundaries,</text>
    <text x="690" y="466" class="b">reliability, security, and maintainability.</text>

    <rect x="58" y="506" width="276" height="104" rx="20" fill="#0F172A"/>
    <rect x="58.5" y="506.5" width="275" height="103" rx="19.5" stroke="#8B5CF6" stroke-opacity="0.2"/>
    <text x="82" y="544" class="h">Cloud &amp; Infrastructure</text>
    <text x="82" y="574" class="b">AWS, Azure, provisioning, networking,</text>
    <text x="82" y="596" class="b">access, and operational excellence.</text>

    <rect x="362" y="506" width="276" height="104" rx="20" fill="#0F172A"/>
    <rect x="362.5" y="506.5" width="275" height="103" rx="19.5" stroke="#FACC15" stroke-opacity="0.2"/>
    <text x="386" y="544" class="h">Observability</text>
    <text x="386" y="574" class="b">Monitoring, alerting, dashboards, service</text>
    <text x="386" y="596" class="b">health, and reliability practices.</text>

    <rect x="666" y="506" width="276" height="104" rx="20" fill="#0F172A"/>
    <rect x="666.5" y="506.5" width="275" height="103" rx="19.5" stroke="#22C55E" stroke-opacity="0.2"/>
    <text x="690" y="544" class="h">Training &amp; Mentorship</text>
    <text x="690" y="574" class="b">Practical learning for students, freshers,</text>
    <text x="690" y="596" class="b">and engineering teams.</text>
  </g>
</svg>
