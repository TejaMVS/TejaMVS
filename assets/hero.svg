<svg width="1000" height="430" viewBox="0 0 1000 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Teja MVS Professional Profile Header</title>
  <desc id="desc">Technical Team Lead profile header for DevOps architecture, cloud platforms, system design, and mentoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="accent" x1="84" y1="68" x2="916" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.48" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="960" height="390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .name { font: 900 68px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .role { font: 800 24px 'Segoe UI', Arial, sans-serif; fill: #E0F2FE; }
      .text { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .chip { font: 800 14px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1000" height="430" rx="28" fill="url(#bg)"/>
  <circle cx="868" cy="72" r="156" fill="#38BDF8" opacity="0.08"/>
  <circle cx="110" cy="356" r="172" fill="#22C55E" opacity="0.07"/>
  <path d="M84 332C214 230 276 340 402 238C528 136 628 190 738 116C814 64 872 62 916 70" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>

  <g filter="url(#shadow)">
    <rect x="70" y="72" width="860" height="284" rx="28" fill="#0F172A" fill-opacity="0.88"/>
    <rect x="70.5" y="72.5" width="859" height="283" rx="27.5" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="110" y="150" class="name">Teja MVS</text>
    <text x="114" y="194" class="role">Technical Team Lead | DevOps Architecture | System Design</text>
    <text x="114" y="236" class="text">Designing reliable platforms, scalable cloud architecture, clean CI/CD systems,</text>
    <text x="114" y="262" class="text">and practical engineering learning paths for teams and DevOps learners.</text>

    <rect x="114" y="298" width="150" height="36" rx="18" fill="#2563EB"/>
    <text x="143" y="321" class="chip">Cloud Platforms</text>
    <rect x="276" y="298" width="146" height="36" rx="18" fill="#0F766E"/>
    <text x="305" y="321" class="chip">Automation First</text>
    <rect x="434" y="298" width="142" height="36" rx="18" fill="#7C3AED"/>
    <text x="464" y="321" class="chip">System Design</text>
    <rect x="588" y="298" width="122" height="36" rx="18" fill="#F97316"/>
    <text x="619" y="321" class="chip">Mentoring</text>
    <rect x="754" y="118" width="108" height="108" rx="30" fill="#22C55E" fill-opacity="0.13"/>
    <path d="M784 184h18v-48h-18v48Zm28 0h18v-68h-18v68Zm28 0h18v-34h-18v34Z" fill="#22C55E"/>
  </g>
